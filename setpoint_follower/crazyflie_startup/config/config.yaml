/**: 
  ros__parameters:
    robot_prefix: '/crazyflie'
    use_sim_time: true

    SYSTEM: 0 #0: SIM or 1: REAL
    DIM: 2
    NUM_AGENTS: 10

    MAIN_TIMER: 0.1
    SETPOINT_TIMER: 0.1
    AGENT_TIMER: 0.05  # frequency of the MPC 
    SPEED: 0.4
    BOX_WEIGHT: 10
    COMM_DISTANCE: 2.2

    SIDE_LENGTH: 10.0
    ARENA_SIZE: 100.0
    MAX_INPUT: 10.0
    HOOVERING_HEIGHT: 1. #alitude at which the drones move nominally

    POSITIONS:
      POS_1:  [ 2.0,   0.5,  0.0 ]
      POS_2:  [ 2.0,  -0.5,  0.0 ]
      POS_3:  [ 0.33,  2.0,  0.0 ]
      POS_4:  [ 0.33,  0.0,  0.0 ]
      POS_5:  [ 0.33, -2.0,  0.0 ]
      POS_6:  [ -0.33,  2.0,  0.0 ]
      POS_7:  [ -0.33,  0.0,  0.0 ]
      POS_8:  [ -0.33, -2.0,  0.0 ]
      POS_9:  [ -2.0,   0.5,  0.0 ]
      POS_10: [ -2.0,  -0.5,  0.0 ]


    PERIODS:
      period_0: [20.0, 25.0]

    TASKS:
      # --- The Vertical Backbone ---
      # Agent 2 is at the top of the stem
      task_1:
        period_num: 0
        edges: [1, 2]
        rel_position: [0.0, 1.0]
        size: 0.2
        type: "always"

      # Agent 3 is at the bottom of the stem
      task_2:
        period_num: 0
        edges: [1, 3]
        rel_position: [0.0, -1.0]
        size: 0.2
        type: "always"

      # --- The Upper Arm ---
      # Agent 4 is the midpoint of the upper diagonal
      task_3:
        period_num: 0
        edges: [1, 4]
        rel_position: [0.5, 0.5]
        size: 0.2
        type: "always"

      # Agent 5 is the tip of the upper diagonal
      task_4:
        period_num: 0
        edges: [1, 5]
        rel_position: [1.0, 1.0]
        size: 0.2
        type: "always"

      # --- The Lower Arm ---
      # Agent 6 is the midpoint of the lower diagonal
      task_5:
        period_num: 0
        edges: [1, 6]
        rel_position: [0.5, -0.5]
        size: 0.2
        type: "always"

      # Agent 7 is the tip of the lower diagonal
      task_6:
        period_num: 0
        edges: [1, 7]
        rel_position: [1.0, -1.0]
        size: 0.2
        type: "always"

     