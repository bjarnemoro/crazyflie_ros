/**: 
  ros__parameters:
    robot_prefix: '/crazyflie'
    use_sim_time: true

    SYSTEM: 0 #0: SIM or 1: REAL
    DIM: 2
    NUM_AGENTS: 10

    MAIN_TIMER: 0.1
    SETPOINT_TIMER: 0.1
    AGENT_TIMER: 0.05  # frequency of the MPC 
    SPEED: 0.4
    BOX_WEIGHT: 10
    COMM_DISTANCE: 3.

    SIDE_LENGTH: 10.0
    ARENA_SIZE: 100.0
    MAX_INPUT: 10.0
    HOOVERING_HEIGHT: 1. #alitude at which the drones move nominally

    POSITIONS:
      POS_1:  [ 2.0,   0.5,  0.0 ]
      POS_2:  [ 2.0,  -0.5,  0.0 ]
      POS_3:  [ 0.33,  2.0,  0.0 ]
      POS_4:  [ 0.33,  0.0,  0.0 ]
      POS_5:  [ 0.33, -2.0,  0.0 ]
      POS_6:  [ -0.33,  2.0,  0.0 ]
      POS_7:  [ -0.33,  0.0,  0.0 ]
      POS_8:  [ -0.33, -2.0,  0.0 ]
      POS_9:  [ -2.0,   0.5,  0.0 ]
      POS_10: [ -2.0,  -0.5,  0.0 ]


    PERIODS:
      period_0: [20.0, 25.0]
      period_1: [40.0, 45.0]
      period_2: [60.0, 65.0]

    TASKS:
      # PERIOD 0 — LETTER K
      # =======================
      # Origin (0,0) is the center of the K.
      task_1: # Vertical Top
        period_num: 0
        edges: [1, 2]
        rel_position: [0., 2.0] 
        size: 0.2
      task_2: # Vertical Bottom
        period_num: 0
        edges: [1, 3]
        rel_position: [0., -2.0]
        size: 0.2
      task_3: # Midpoint/Joint
        period_num: 0
        edges: [1, 4]
        rel_position: [2.0, 2.0]
        size: 0.2
      task_4: # Upper Diagonal Tip
        period_num: 0
        edges: [1, 5]
        rel_position: [2., -2.0]
        size: 0.2

      # PERIOD 1 — LETTER T
      # =======================
      task_5: # Vertical Top
        period_num: 1
        edges: [6, 8]
        rel_position: [2., 0.0] 
        size: 0.2
      task_6: # Vertical Bottom
        period_num: 1
        edges: [6, 7]
        rel_position: [-2., 0.0]
        size: 0.2
      task_7: # Midpoint/Joint
        period_num: 1
        edges: [6, 5]
        rel_position: [0.0, -2.0]
        size: 0.2
      task_8: # Upper Diagonal Tip
        period_num: 1
        edges: [5, 4]
        rel_position: [0., -2.0]
        size: 0.2

      # PERIOD 2 — LETTER H
      # =======================
      task_9: # Vertical Top
        period_num: 2
        edges: [1, 2]
        rel_position: [-2., 0.0] 
        size: 0.2
      task_10: # Vertical Bottom
        period_num: 2
        edges: [1, 3]
        rel_position: [2., 0.0]
        size: 0.2
      task_11: # Midpoint/Joint
        period_num: 2
        edges: [2, 4]
        rel_position: [0.0, 2.0]
        size: 0.2
      task_12: # Upper Diagonal Tip
        period_num: 2
        edges: [2, 6]
        rel_position: [0., -2.0]
        size: 0.2
      task_13: # Upper Diagonal Tip
        period_num: 2
        edges: [3, 5]
        rel_position: [0., 2.0]
        size: 0.2
      task_14: # Upper Diagonal Tip
        period_num: 2
        edges: [3, 7]
        rel_position: [0., -2.0]
        size: 0.2




     