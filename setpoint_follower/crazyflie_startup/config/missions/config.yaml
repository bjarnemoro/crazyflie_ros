/**: 
  ros__parameters:
    
    ###########################################
    # General node parameters 
    ###########################################
    DIM: 2               # Dimension of the space
    MANAGER_TIMER: 0.8   # Time at which the manager updates (seconds)
    AGENT_TIMER: 0.05    # frequency of the MPC (seconds)
    SPEED: 0.4           # Nominal speed of the agents
    BOX_WEIGHT: 10       # Weight of the boxes in the cost function
    COMM_DISTANCE: 3.    # Communication distance between agents
    HOOVERING_HEIGHT: 1. # Alitude at which the drones move nominally

    ###########################################################################################################
    # Specific of each agent. The agent number corresponds to the crazyflie number (check the tag on the drone).
    # N.B. Make sure that a drone with such number exists in the real fleet or in the simulation.
    ###########################################################################################################

    agent_1:
      pos:  [ 2.0,   0.5,  0.3 ]
      radio: 1
      channel: 80

    agent_2:
      pos:  [ 2.0,  -0.5,  0.3 ]
      radio: 1
      channel: 80

    agent_3:
      pos:  [ 0.33,  2.0,  0.3 ]
      radio: 1
      channel: 80

    agent_4:
      pos:  [ 0.33,  0.0,  0.3 ]
      radio: 1
      channel: 80

    agent_5:
      pos:  [ 0.33, -2.0,  0.3 ]
      radio: 1
      channel: 80

    agent_6:
      pos:  [ -0.33,  2.0,  0.3 ]
      radio: 1
      channel: 80

    agent_7:
      pos:  [ -0.33,  0.0,  0.3 ]
      radio: 1
      channel: 80

    agent_8:
      pos:  [ -0.33, -2.0,  0.3 ]
      radio: 1
      channel: 80

    agent_9:
      pos:  [ -2.0,   0.5,  0.3 ]
      radio: 1
      channel: 80

    agent_10:
      pos: [ -2.0,  -0.5,  0.3 ]
      radio: 1
      channel: 80

    
    ###########################################################################################################
    # Tasks specifications
    ###########################################################################################################

    # Tasks grouping by period
    PERIODS:
      period_0: [20.0, 25.0]
      period_1: [50.0, 65.0]
      period_2: [85.0, 90.0]

    TASKS:
      # PERIOD 0 — LETTER K
      # =======================
      # Origin (0,0) is the center of the K.
      task_1: 
        period_num: 0             # period at which the task is accomplished 
        edges: [1, 2]             # edge that defines the relative position (nb: make sure that an agent with the given number exists)
        rel_position: [0., 2.0]   # relative position with respect to the edge defined by the two agents
        size: 0.2                 # size of the task (radius of the area to be covered)
      task_2: # Vertical Bottom
        period_num: 0
        edges: [1, 3]
        rel_position: [0., -2.0]
        size: 0.2
      task_3: # Midpoint/Joint
        period_num: 0
        edges: [1, 4]
        rel_position: [2.0, 2.0]
        size: 0.2
      task_4: # Upper Diagonal Tip
        period_num: 0
        edges: [1, 5]
        rel_position: [2., -2.0]
        size: 0.2
      
      task_30: # Upper Diagonal Tip
        period_num: 0
        edges: [1, 1]
        rel_position: [1.4, 1.4]
        size: 0.2

      # PERIOD 1 — LETTER T
      # =======================
      task_5: # Vertical Top
        period_num: 1
        edges: [6, 8]
        rel_position: [2., 0.0] 
        size: 0.2
      task_6: # Vertical Bottom
        period_num: 1
        edges: [6, 7]
        rel_position: [-2., 0.0]
        size: 0.2
      task_7: # Midpoint/Joint
        period_num: 1
        edges: [6, 5]
        rel_position: [0.0, -2.0]
        size: 0.2
      task_8: # Upper Diagonal Tip
        period_num: 1
        edges: [5, 4]
        rel_position: [0., -2.0]
        size: 0.2

      # PERIOD 2 — LETTER H
      # =======================
      task_9: # Vertical Top
        period_num: 2
        edges: [1, 2]
        rel_position: [-2., 0.0] 
        size: 0.2
      task_10: # Vertical Bottom
        period_num: 2
        edges: [1, 3]
        rel_position: [2., 0.0]
        size: 0.2
      task_11: # Midpoint/Joint
        period_num: 2
        edges: [2, 4]
        rel_position: [0.0, 2.0]
        size: 0.2
      task_12: # Upper Diagonal Tip
        period_num: 2
        edges: [2, 6]
        rel_position: [0., -2.0]
        size: 0.2
      task_13: # Upper Diagonal Tip
        period_num: 2
        edges: [3, 5]
        rel_position: [0., 2.0]
        size: 0.2
      task_14: # Upper Diagonal Tip
        period_num: 2
        edges: [3, 7]
        rel_position: [0., -2.0]
        size: 0.2




     